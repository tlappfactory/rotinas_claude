name: fetch-dou-dejt-tcu-diario

on:
  schedule:
    # 13:00 UTC = 10:00 Brasília (antes da sessão Claude das 11h30); dias úteis.
    # Janela escolhida porque (a) o INLabs já tem o pacote do DOU consolidado às
    # 10h BRT — versões mais cedo costumam retornar 404/parcial; (b) o DEJT do
    # dia tem publicação válida (disponibilizado na véspera às 19h BRT); (c)
    # ainda dá ~2h de folga até o expediente da COLEP começar (12h BRT).
    - cron: "0 13 * * 1-5"
    # Execução de sábado: o DEJT disponibilizado sexta ~19h tem publicação na
    # segunda-feira (Lei 11.419/2006, art. 4º, §3º). Sem este run, essa edição
    # só seria capturada pelo cron de segunda 13 UTC — janela apertada antes do
    # boletim das 11h30. O run de sábado a deixa commitada no bridge com o fim
    # de semana inteiro de folga.
    - cron: "0 13 * * 6"
  workflow_dispatch:
    inputs:
      data:
        description: "Data alvo YYYY-MM-DD (vazio = hoje + catch-up)"
        required: false
      catchup:
        description: "Dias de catch-up quando 'data' está vazia"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fetch-dou-dejt-tcu
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps (Python + poppler para PDF)
        run: |
          pip install -r requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils

      - name: Fetch INLabs (DOU XML)
        env:
          INLABS_EMAIL: ${{ secrets.INLABS_EMAIL }}
          INLABS_PASSWORD: ${{ secrets.INLABS_PASSWORD }}
        run: |
          mkdir -p dou logs
          if [ -n "${{ inputs.data }}" ]; then
            python scripts/fetch_inlabs.py "${{ inputs.data }}"
          else
            python scripts/fetch_inlabs.py --catchup "${{ inputs.catchup || '7' }}"
          fi

      - name: Parse DOU
        run: python scripts/parse_dou.py --force

      - name: Fetch DEJT (PDFs TRT-17 / CSJT / TST)
        env:
          # Convenção: o DEJT é disponibilizado às 19h Brasília do dia D-1 e
          # considerado PUBLICADO no primeiro dia útil seguinte (Lei 11.419/2006,
          # art. 4º, §3º). O cron das 09 UTC roda na manhã do dia útil de
          # publicação, então a publicação esperada é "hoje" (data UTC, o runner
          # do GitHub está em UTC; em casos extremos pré-dawn Brasília isso pode
          # divergir, mas o cron das 09 UTC garante alinhamento).
          # Se a publicação detectada for anterior à esperada, o script marca
          # `pdf_stale` em vez de `ok` — sinal para re-tentar mais tarde.
          # No run de sábado a publicação esperada é a data do sábado: a edição
          # de sexta tem publicação na segunda (futura), nunca anterior, então
          # nunca é falsamente marcada `pdf_stale`; é arquivada como `ok` na
          # pasta da sua data de publicação real (segunda-feira).
          DEJT_EXPECTED_PUBLICATION_DATE: ${{ inputs.data || '' }}
        run: |
          mkdir -p dejt
          # Sem `inputs.data` (cron diário), assume publicação esperada = hoje.
          if [ -z "$DEJT_EXPECTED_PUBLICATION_DATE" ]; then
            export DEJT_EXPECTED_PUBLICATION_DATE="$(date -u +%Y-%m-%d)"
          fi
          echo "Publicação esperada: $DEJT_EXPECTED_PUBLICATION_DATE"
          python scripts/fetch_dejt.py

      - name: Parse DEJT
        run: python scripts/parse_dejt.py --force

      - name: Fetch+filter TCU (acórdãos via API JSON dados-abertos)
        run: |
          mkdir -p tcu
          python scripts/fetch_tcu.py --lookback 14 || \
            echo "AVISO: fetch_tcu.py falhou — TCU será marcado como fonte indisponível neste run."

      - name: Commit JSONs filtrados
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'dou/*/inlabs-filtered.json' \
                  'dejt/*/dejt-filtered.json' 'dejt/_last_fetch.json' \
                  'tcu/*/tcu-filtered.json'
          if git diff --staged --quiet; then
            echo "Nenhuma novidade a commitar."
            exit 0
          fi
          git commit -m "DOU+DEJT+TCU filtrados — $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Push com tolerância a corrida (humano commitando no main entre o
          # checkout e o push). Tenta rebase em cima de origin/main e re-push.
          for attempt in 1 2 3 4; do
            if git push origin HEAD:main; then
              echo "push ok na tentativa $attempt"
              exit 0
            fi
            echo "push falhou na tentativa $attempt; tentando rebase em origin/main"
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; sleep $((attempt*5)); }
          done
          echo "ERRO: 4 tentativas de push falharam." >&2
          exit 1

      - name: Upload de log (artefato)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fetch-log-${{ github.run_id }}
          path: logs/
          retention-days: 14
