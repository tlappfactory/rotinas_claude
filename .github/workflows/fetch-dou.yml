name: fetch-dou-diario

on:
  schedule:
    # 11:00 UTC = 08:00 Brasília (DOU já circulou); dias úteis (seg-sex).
    - cron: "0 11 * * 1-5"
  workflow_dispatch:
    inputs:
      data:
        description: "Data alvo YYYY-MM-DD (vazio = hoje + catch-up)"
        required: false
      catchup:
        description: "Dias de catch-up quando 'data' está vazia"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fetch-dou
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch INLabs (DOU XML)
        env:
          INLABS_EMAIL: ${{ secrets.INLABS_EMAIL }}
          INLABS_PASSWORD: ${{ secrets.INLABS_PASSWORD }}
        run: |
          mkdir -p dou logs
          if [ -n "${{ inputs.data }}" ]; then
            python scripts/fetch_inlabs.py "${{ inputs.data }}"
          else
            python scripts/fetch_inlabs.py --catchup "${{ inputs.catchup || '7' }}"
          fi

      - name: Parse e filtrar
        run: python scripts/parse_dou.py --force

      - name: Commit dos JSONs filtrados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'dou/*/inlabs-filtered.json'
          if git diff --staged --quiet; then
            echo "Nenhuma novidade a commitar."
          else
            git commit -m "DOU filtrado — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Upload de log (artefato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-log-${{ github.run_id }}
          path: logs/fetch_inlabs.log
          retention-days: 14
