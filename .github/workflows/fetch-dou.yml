name: fetch-dou-dejt-diario

on:
  schedule:
    # 09:00 UTC = 06:00 Brasília (antes da sessão Claude das 07h); dias úteis.
    # Se o INLabs ainda não tiver publicado o DOU do dia, o catch-up de 7 dias
    # do run seguinte recupera. DEJT (diario.jt.jus.br) já está disponível.
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      data:
        description: "Data alvo YYYY-MM-DD (vazio = hoje + catch-up)"
        required: false
      catchup:
        description: "Dias de catch-up quando 'data' está vazia"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fetch-dou-dejt
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps (Python + poppler para PDF)
        run: |
          pip install -r requirements.txt
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils

      - name: Fetch INLabs (DOU XML)
        env:
          INLABS_EMAIL: ${{ secrets.INLABS_EMAIL }}
          INLABS_PASSWORD: ${{ secrets.INLABS_PASSWORD }}
        run: |
          mkdir -p dou logs
          if [ -n "${{ inputs.data }}" ]; then
            python scripts/fetch_inlabs.py "${{ inputs.data }}"
          else
            python scripts/fetch_inlabs.py --catchup "${{ inputs.catchup || '7' }}"
          fi

      - name: Parse DOU
        run: python scripts/parse_dou.py --force

      - name: Fetch DEJT (PDFs TRT-17 / CSJT / TST)
        run: |
          mkdir -p dejt
          python scripts/fetch_dejt.py

      - name: Parse DEJT
        run: python scripts/parse_dejt.py --force

      - name: Commit JSONs filtrados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'dou/*/inlabs-filtered.json' 'dejt/*/dejt-filtered.json'
          if git diff --staged --quiet; then
            echo "Nenhuma novidade a commitar."
          else
            git commit -m "DOU+DEJT filtrados — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Upload de log (artefato)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fetch-log-${{ github.run_id }}
          path: logs/
          retention-days: 14
